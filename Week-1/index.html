<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>

    <link rel="stylesheet" href="stylee.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

    <!-- White Card -->
    <div class="back-card">

        <h2>Financial Report, December 25, 2026</h2>

    </div>

    <!-- Blue Card -->

    <div class="front-card">

        <div class="money-section">

            <h3>Current Money</h3>

            <div class="money-row">

                <h1>$536.67</h1>

                <button class="details">Details</button>

            </div>

        </div>

        <div class="category">

            <button>Daily Bills</button>
            <button>Vehicle</button>
            <button>Meal Cost</button>

        </div>

        <div class="plus">

            +

        </div>

        <p>Add custom data</p>

    </div>

</div>

</body>
</html>
